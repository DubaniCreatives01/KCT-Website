<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    // Enforce clean URLs by removing index.html from the address bar
    if (window.location.pathname.endsWith('/index.html')) {
      var cleanPath = window.location.pathname.substring(0, window.location.pathname.length - 10);
      window.history.replaceState(null, '', cleanPath + window.location.search + window.location.hash);
    } else if (window.location.pathname === '/index.html') {
      window.history.replaceState(null, '', '/' + window.location.search + window.location.hash);
    }
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  
  <!-- SEO Best Practices -->
  <title>{{title}}</title>
  <meta name="description" content="{{description}}">
  
  <!-- Network Optimization: Preconnect to CDNs -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  
  <!-- Favicon -->
  <link rel="icon" type="image/jpeg" href="{{relativePath}}assets/images/KCT_LOGO-300x300.jpg" sizes="300x300">
  <link rel="apple-touch-icon" href="{{relativePath}}assets/images/KCT_LOGO-300x300.jpg">
  
  <!-- Preload Critical Above-The-Fold Assets (First Hero Canvas Frame) -->
  <link rel="preload" as="image" href="{{relativePath}}assets/images/2.webp">
  
  <!-- FontAwesome Icons CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  
  <!-- Google Fonts - Asynchronous & Swap Loading -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
  </noscript>
  
  <!-- Central Stylesheet Framework (Production Bundle) -->
  <link rel="stylesheet" href="{{relativePath}}assets/css/main.min.css?v=2.2">
  
  <!-- Custom page style injections if any -->
  {{pageStyles}}
</head>
